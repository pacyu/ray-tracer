name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Package and Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 1. 核心：从刚刚触发的或最近成功的 CI 编译流水线中下载 Windows 二进制
      - name: Download Windows Binary
        uses: actions/download-artifact@v5
        with:
          name: compiled-binary-windows-latest
          path: win_bin/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # 自动寻找同一个 commit 触发的最新编译工作流制品
          run-id: ${{ github.run_id }} 
        continue-on-error: true

      # 2. 从 CI 编译流水线中下载 Linux 二进制
      - name: Download Linux Binary
        uses: actions/download-artifact@v5
        with:
          name: compiled-binary-ubuntu-24.04
          path: linux_bin/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.run_id }}
        continue-on-error: true

      # 3. 在 Ubuntu 环境下直接进行全平台成果压缩打包
      - name: Package Assets
        run: |
          mkdir -p release_assets
          
          # 打包 Windows 产物 (包含 exe 和可能生成的 dll)
          if [ -d "win_bin" ]; then
            cd win_bin && zip -r ../release_assets/raytracer-windows-x86_64.zip * && cd ..
          fi
          
          # 打包 Linux 产物
          if [ -d "linux_bin" ]; then
            chmod +x linux_bin/rayt
            cd linux_bin && tar czvf ../release_assets/raytracer-linux-x86_64.tar.gz * && cd ..
          fi

      # 4. 发布到 GitHub Release 页面
      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}